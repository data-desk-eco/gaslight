<!doctype html>
<notebook theme="midnight">
  <title>Dark flaring in the Permian Basin</title>

  <script id="q_headline" output="headline" type="application/sql" database="../data/dark_flaring.duckdb" hidden>
    SELECT * FROM headline
  </script>

  <script id="q_sites" output="sites" type="application/sql" database="../data/dark_flaring.duckdb" hidden>
    SELECT * FROM dark_sites
  </script>

  <script id="q_operators" output="operators" type="application/sql" database="../data/dark_flaring.duckdb" hidden>
    SELECT * FROM dark_operators
  </script>

  <script id="q_quarterly" output="quarterly" type="application/sql" database="../data/dark_flaring.duckdb" hidden>
    SELECT * FROM dark_quarterly
  </script>

  <script id="q_leases" output="leases" type="application/sql" database="../data/dark_flaring.duckdb" hidden>
    SELECT * FROM top_leases LIMIT 25
  </script>

  <script id="counties" type="module">
    const us = await fetch("https://cdn.jsdelivr.net/npm/us-atlas@3/counties-10m.json").then(r => r.json());
    const txCounties = {type: "FeatureCollection", features: topojson.feature(us, us.objects.counties).features.filter(d => d.id.startsWith("48"))};
    const tx = {type: "FeatureCollection", features: topojson.feature(us, us.objects.states).features.filter(d => d.id === "48")};
  </script>

  <script id="header" type="text/markdown">
    # Dark flaring in the Permian Basin

    Satellite flare detections ([VIIRS Nightfire](https://eogdata.mines.edu/products/vnf/)) matched to [SWR 32 permitted flare locations](https://webapps.rrc.state.tx.us/swr32/publicquery.xhtml), then checked against active permit dates. Upstream production sites only.

    **${headline[0].dark_sites} dark flare sites** with **${d3.format(",")(headline[0].dark_days)} detection-days** of unpermitted flaring (**${headline[0].pct_dark}%** of all detection-days). Self-reported flaring volumes suggest **${headline[0].unpermitted_bcf} Bcf** (${headline[0].pct_reported_unpermitted}%) was flared outside permitted windows.
  </script>

  <script id="year_select" type="module">
    const years = Array.from(new Set(sites.map(d => d.year))).sort();
    const selectedYear = view(Inputs.range([years[0], years[years.length - 1]], {step: 1, value: years[years.length - 1], label: "Year"}));
  </script>

  <script id="map" type="module">
    display(Plot.plot({
      projection: {type: "mercator", domain: {type: "MultiPoint", coordinates: [[-104.5, 30.5], [-100.0, 33.1]]}},
      width: 960, height: 700, marginTop: 10,
      color: {scheme: "YlOrRd", reverse: true, domain: [0, d3.max(sites, d => d.avg_rh_mw)], label: "Avg radiant heat (MW)", legend: true},
      r: {range: [2, 14], domain: [0, d3.max(sites, d => d.avg_rh_mw)]},
      marks: [
        Plot.geo(txCounties, {fill: "#1a1a2e", stroke: "#2a2a3e"}),
        Plot.geo(tx, {fill: "none", stroke: "#555", strokeWidth: 1.5}),
        Plot.dot(sites.filter(d => d.year === selectedYear), {
          x: "lon", y: "lat", r: "avg_rh_mw", fill: "avg_rh_mw",
          stroke: "#fff", strokeWidth: 0.5, tip: true,
          title: d => `${d.operator}${d.confidence === 'contested' ? ' (contested)' : ''}\n${d.detection_days} days, avg ${d.avg_rh_mw} MW`
        })
      ]
    }));
  </script>

  <script id="hr1" type="text/html"><hr></script>

  <script id="operator_header" type="text/markdown">
    ## Top operators by unpermitted flaring (satellite)

    Operators attributed by matching dark flare sites to the nearest SWR 32 permit location. Contested sites (multiple operators) excluded.
  </script>

  <script id="operator_chart" type="module">
    display(Plot.plot({
      width: 960, height: 400, marginLeft: 250,
      x: {label: "Total radiant heat (MW)", grid: true},
      y: {label: null, domain: operators.map(d => d.operator)},
      color: {scheme: "YlOrRd", reverse: true, type: "log"},
      marks: [
        Plot.barX(operators, {y: "operator", x: "total_rh_mw", fill: "total_rh_mw", tip: true,
          title: d => `${d.operator}\n${d3.format(",")(d.total_rh_mw)} MW\n${d3.format(",")(d.detection_days)} days\n${d.sites} sites`}),
        Plot.ruleX([0])
      ]
    }));
  </script>

  <script id="hr2" type="text/html"><hr></script>

  <script id="lease_header" type="text/markdown">
    ## Top leases by unpermitted flaring

    Each SWR 32 permit maps to its underlying oil and gas leases. This connects satellite flare detections to leases that operators report flaring volumes on in [production reports](https://www.rrc.texas.gov/oil-and-gas/research-and-statistics/production-data/). Reported flaring is pro-rated by daily permit coverage (median permit duration: 11 days).
  </script>

  <script id="lease_table" type="module">
    display(Inputs.table(leases, {
      columns: ["district", "lease_number", "operator", "lease_name", "reported_mcf", "unpermitted_mcf", "avg_coverage", "vnf_days", "vnf_rh_mw"],
      header: {
        district: "Dist", lease_number: "Lease", operator: "Operator", lease_name: "Lease name",
        reported_mcf: "Reported (Mcf)", unpermitted_mcf: "Unpermitted (Mcf)",
        avg_coverage: "Permit coverage", vnf_days: "VNF days", vnf_rh_mw: "VNF (MW)"
      },
      format: {
        reported_mcf: d => d3.format(",.0f")(d),
        unpermitted_mcf: d => d3.format(",.0f")(d),
        avg_coverage: d => d3.format(".0%")(d),
        vnf_rh_mw: d => d3.format(",.1f")(d)
      },
      rows: 25
    }));
  </script>

  <script id="hr3" type="text/html"><hr></script>

  <script id="trend_header" type="text/markdown">
    ## Quarterly satellite trend

    SWR 32 permits in our data begin Q4 2023.
  </script>

  <script id="quarterly_chart" type="module">
    display(Plot.plot({
      width: 960, height: 350,
      x: {label: null},
      y: {label: "Detection-days", grid: true},
      color: {domain: [false, true], range: ["#f5deb3", "#e25822"], legend: true,
        tickFormat: d => d ? "Dark" : "Permitted"},
      marks: [
        Plot.rectY(quarterly, Plot.stackY({order: d => d.is_dark ? 1 : 0, x: "quarter", interval: "quarter", y: "detection_days", fill: "is_dark", tip: true})),
        Plot.ruleY([0])
      ]
    }));
  </script>

</notebook>
